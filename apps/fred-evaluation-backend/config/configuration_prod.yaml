app:
  name: Fred Evaluation Backend
  base_url: /evaluation/v1
  address: 0.0.0.0
  port: 8336
  log_level: info

storage:
  postgres:
    sqlite_path: "~/.fred/evaluation/evaluation.sqlite3"
# # storage:
# # postgres:
#   host: postgres
#     port: 5432
#     database: evaluation
#     username: evaluation
#     # password is read from the FRED_POSTGRES_PASSWORD environment variable

security:
  user:
    enabled: true
    realm_url: http://localhost:8080/realms/app
    client_id: app
  m2m:
    enabled: true
    realm_url: http://app-keycloak:8080/realms/app
    client_id: fred-evaluation-worker
    secret_env_var: KEYCLOAK_EVAL_WORKER_CLIENT_SECRET # pragma: allowlist secret
  authorized_origins:
    - http://localhost:5173

observability:
  tracer: langfuse # null | logging | langfuse
  langfuse:
    host: http://localhost:3001
    # LANGFUSE_PUBLIC_KEY and LANGFUSE_SECRET_KEY come from .env
  kpi:
    log:
      enabled: true
    prometheus:
      enabled: false
    opensearch:
      enabled: false

control_plane:
  base_url: http://localhost:8222/control-plane/v1
  runtime_base_url: http://localhost:8000
  # Runtime app serving the history capture endpoint (must include the path prefix).
  runtime_history_base_url: http://localhost:8000/fred/agents/v2

worker:
  max_concurrent_cases: 4
  poll_interval_seconds: 5
  judge_profiles:
    # Available providers: litellm | openai | ollama
    mistral-small:
      provider: litellm
      name: mistral/mistral-small-latest
      settings:
        api_key_env: MISTRAL_API_KEY  # pragma: allowlist secret
    mistral-medium:
      provider: litellm
      name: mistral/mistral-medium-latest
      settings:
        api_key_env: MISTRAL_API_KEY  # pragma: allowlist secret
    # openai-mini:
    #   provider: openai
    #   name: gpt-4o-mini
    #   settings:
    #     api_key_env: OPENAI_API_KEY  # pragma: allowlist secret
    #     base_url: https://...   # optional: OpenAI-compatible endpoint
    # llama-local:
    #   provider: ollama
    #   name: llama3
    #   settings:
    #     base_url: http://localhost:11434

scheduler:
  backend: temporal  # backend: memory
  temporal:
    host: localhost:7233  # host: app-temporal:7233 (if running in Docker)
    task_queue: evaluation

# Model used to write the campaign analysis (separate from the scoring judge).
# Available providers: litellm | openai | ollama
analysis:
  provider: litellm
  name: mistral/mistral-small-latest
  settings:
    api_key_env: MISTRAL_API_KEY  # pragma: allowlist secret
  # OpenAI (requires an OPENAI_API_KEY):
  # provider: openai
  # name: gpt-4o-mini
  # settings:
  #   api_key_env: OPENAI_API_KEY  # pragma: allowlist secret
  #   base_url: https://...   # optional: OpenAI-compatible endpoint
  # Ollama (local model, requires Ollama running):
  # provider: ollama
  # name: llama3
  # settings:
  #   base_url: http://localhost:11434
