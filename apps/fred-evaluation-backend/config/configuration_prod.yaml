app:
  name: Fred Evaluation Backend
  base_url: /evaluation/v1
  address: 0.0.0.0
  port: 8336
  log_level: info

storage:
  postgres:
    host: postgres
    port: 5432
    database: evaluation
    username: evaluation
    # password is read from the FRED_POSTGRES_PASSWORD environment variable

security:
  user:
    enabled: true
    realm_url: http://localhost:8080/realms/app
    client_id: app
  m2m:
    enabled: true
    realm_url: http://localhost:8080/realms/app
    client_id: evaluation
    secret_env_var: KEYCLOAK_EVALUATION_CLIENT_SECRET # pragma: allowlist secret
  authorized_origins:
    - http://localhost:5173

observability:
  tracer: langfuse # null | logging | langfuse
  langfuse:
    host: http://localhost:3001
    # LANGFUSE_PUBLIC_KEY and LANGFUSE_SECRET_KEY come from .env
  kpi:
    log:
      enabled: true
    prometheus:
      enabled: false
    opensearch:
      enabled: false

control_plane:
  base_url: http://localhost:8222/control-plane/v1
  runtime_base_url: http://localhost:8000

worker:
  max_concurrent_cases: 4
  poll_interval_seconds: 5
  judge_profiles:

    mistral-small:
      provider: openai
      model: openai/mistral-small-2508
      settings:
        base_url: https://api.mistral.ai/v1
        api_key_env: MISTRAL_API_KEY
    mistral-medium:
      provider: openai
      model: openai/mistral-medium-2508
      settings:
        base_url: https://api.mistral.ai/v1
        api_key_env: MISTRAL_API_KEY

scheduler:
  backend: temporal  # backend: memory
  temporal:
    host: localhost:7233  # host: app-temporal:7233 (if running in Docker)
    task_queue: evaluation
