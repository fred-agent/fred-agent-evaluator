database:
  sqlite_path: "~/.fred/evaluation/evaluation.sqlite3"

security:
  user:
    enabled: false
    realm_url: http://localhost:8080/realms/app
    client_id: app
  authorized_origins:
    - http://localhost:5173

control_plane:
  base_url: http://localhost:8222/control-plane/v1
  runtime_base_url: http://localhost:8000

telemetry:
  enabled: true
  otlp_endpoint: http://localhost:3001
  public_key_env: LANGFUSE_PUBLIC_KEY
  secret_key_env: LANGFUSE_SECRET_KEY

worker:
  max_concurrent_cases: 4
  poll_interval_seconds: 5
  judge_profiles:
    mistral-small:
      provider: litellm
      model: mistral/mistral-small-latest
      settings:
        api_key_env: MISTRAL_API_KEY