services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: evaluation
      POSTGRES_USER: evaluation
      POSTGRES_PASSWORD: evaluation
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: ../../
      dockerfile: apps/fred-evaluation-backend/dockerfiles/Dockerfile-api
    ports:
      - "8336:8336"
    environment:
      CONFIG_FILE: /config/configuration.yaml
    volumes:
      - ./configuration.yaml:/config/configuration.yaml:ro
    depends_on:
      - postgres

  worker:
    build:
      context: ../../
      dockerfile: apps/fred-evaluation-backend/dockerfiles/Dockerfile-worker
    environment:
      CONFIG_FILE: /config/configuration.yaml
    volumes:
      - ./configuration.yaml:/config/configuration.yaml:ro
    depends_on:
      - postgres
      # Uncomment if using dedicated Temporal below (option B):
      # temporal:
      #   condition: service_healthy

  # ---------------------------------------------------------------------------
  # Temporal scheduler — two options, pick one:
  #
  # Option A — shared Temporal from fred-deployment-factory
  #   No services to uncomment here.
  #   Set in configuration.yaml:
  #     scheduler:
  #       backend: temporal
  #       temporal:
  #         host: app-temporal:7233   # Docker hostname of fred's Temporal
  #         task_queue: evaluation
  #   Requires the worker container to join fred-shared-network (add networks below).
  #
  # Option B — dedicated Temporal for fred-agent-evaluator
  #   Uncomment temporal-setup, temporal, temporal-ui below.
  #   Also uncomment the temporal depends_on in worker above.
  #   Set in configuration.yaml:
  #     scheduler:
  #       backend: temporal
  #       temporal:
  #         host: temporal:7233       # Docker hostname of the service below
  #         task_queue: evaluation
  # ---------------------------------------------------------------------------

