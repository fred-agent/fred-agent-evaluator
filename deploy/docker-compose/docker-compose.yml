  #     - |-
  #       temporal-sql-tool --plugin postgres12 --endpoint postgres --port 5432 \
  #         --database temporal --user evaluation --password evaluation \
  #         setup-schema -v 0.0 && \
  #       temporal-sql-tool --plugin postgres12 --endpoint postgres --port 5432 \
  #         --database temporal --user evaluation --password evaluation \
  #         update-schema -d schema/postgresql/v12/temporal/versioned/ && \
  #       temporal-sql-tool --plugin postgres12 --endpoint postgres --port 5432 \
  #         --database temporal_visibility --user evaluation --password evaluation \
  #         setup-schema -v 0.0 && \
